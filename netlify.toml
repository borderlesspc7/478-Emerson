[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/stays/*"
  to = "/.netlify/functions/stays-proxy/:splat"
  status = 200

[[redirects]]
  from = "/api/pagarme/*"
  to = "/.netlify/functions/pagarme-api/:splat"
  status = 200

